<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>叩いた音をドレミ判定</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  text-align:center;
  padding:30px;
}

button{
  font-size:24px;
  padding:18px 30px;
  border-radius:14px;
}

#note{
  font-size:72px;
  margin-top:30px;
}

#freq{
  font-size:24px;
  color:#666;
}
</style>
</head>

<body>

<h1>叩いた音をドレミ判定</h1>

<p>
コップや皿を叩くと、
近い音階を表示します
</p>

<button onclick="startAudio()">
マイク開始
</button>

<div id="note">--</div>
<div id="freq">周波数: -- Hz</div>

<script>

let audioContext;
let analyser;
let mic;
let dataArray;

const notes = [
"ド","ド#","レ","レ#","ミ",
"ファ","ファ#","ソ","ソ#",
"ラ","ラ#","シ"
];

async function startAudio(){

  audioContext = new (
    window.AudioContext ||
    window.webkitAudioContext
  )();

  const stream =
    await navigator.mediaDevices.getUserMedia({
      audio:true
    });

  mic =
    audioContext.createMediaStreamSource(stream);

  analyser =
    audioContext.createAnalyser();

  analyser.fftSize = 4096;

  dataArray =
    new Float32Array(analyser.fftSize);

  mic.connect(analyser);

  detectPitch();
}

function detectPitch(){

  analyser.getFloatTimeDomainData(dataArray);

  const freq =
    autoCorrelate(
      dataArray,
      audioContext.sampleRate
    );

  if(freq > 60 && freq < 2000){

    const noteNumber =
      Math.round(
        12 * Math.log2(freq / 440) + 69
      );

    const noteName =
      notes[noteNumber % 12];

    const octave =
      Math.floor(noteNumber / 12) - 1;

    document.getElementById("note")
      .textContent =
      noteName + octave;

    document.getElementById("freq")
      .textContent =
      "周波数: " +
      freq.toFixed(1) +
      " Hz";
  }

  requestAnimationFrame(detectPitch);
}

function autoCorrelate(buffer,sampleRate){

  let SIZE = buffer.length;

  let rms = 0;

  for(let i=0;i<SIZE;i++){
    rms += buffer[i]*buffer[i];
  }

  rms = Math.sqrt(rms/SIZE);

  if(rms < 0.02){
    return -1;
  }

  let bestOffset = -1;
  let bestCorrelation = 0;

  for(let offset=20;
      offset<SIZE/2;
      offset++){

    let correlation = 0;

    for(let i=0;
        i<SIZE/2;
        i++){

      correlation += Math.abs(
        buffer[i] -
        buffer[i+offset]
      );
    }

    correlation =
      1 - correlation/(SIZE/2);

    if(correlation > bestCorrelation){

      bestCorrelation =
        correlation;

      bestOffset =
        offset;
    }
  }

  if(bestCorrelation > 0.6){
    return sampleRate / bestOffset;
  }

  return -1;
}

</script>

</body>
</html>

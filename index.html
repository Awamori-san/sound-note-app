<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>叩いた音をドレミ判定</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  text-align:center;
  padding:24px;
}

button{
  font-size:20px;
  padding:14px 22px;
  border-radius:14px;
  margin:8px;
}

#note{
  font-size:72px;
  margin-top:24px;
}

#freq{
  font-size:24px;
  color:#666;
  margin-bottom:20px;
}

#keyboard{
  position:relative;
  width:100%;
  max-width:760px;
  height:190px;
  margin:24px auto;
  user-select:none;
}

.white-key{
  position:relative;
  display:inline-flex;
  align-items:flex-end;
  justify-content:center;
  width:13.5%;
  height:180px;
  border:1px solid #333;
  background:white;
  box-sizing:border-box;
  font-size:18px;
  padding-bottom:12px;
}

.black-key{
  position:absolute;
  top:0;
  width:8%;
  height:110px;
  background:#111;
  color:white;
  z-index:2;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  font-size:14px;
  padding-bottom:8px;
  box-sizing:border-box;
  border-radius:0 0 6px 6px;
}

.active-white{
  background:#ffe680;
}

.active-black{
  background:#ff9800;
  color:#111;
}

#audioPlayer{
  margin-top:20px;
  width:90%;
}

#downloadLink{
  font-size:20px;
}
</style>
</head>

<body>

<h1>叩いた音をドレミ判定</h1>

<p>
コップや皿を叩くと、近い音階を表示し、
対応するピアノ鍵盤が光ります
</p>

<button onclick="startAudio()">マイク開始</button>
<button onclick="stopAudio()">マイク停止</button>

<br>

<button onclick="startRecording()">録音開始</button>
<button onclick="stopRecording()">録音停止</button>

<div id="note">--</div>
<div id="freq">停止中</div>

<div id="keyboard">
  <div class="white-key" data-note="ド">ド</div>
  <div class="white-key" data-note="レ">レ</div>
  <div class="white-key" data-note="ミ">ミ</div>
  <div class="white-key" data-note="ファ">ファ</div>
  <div class="white-key" data-note="ソ">ソ</div>
  <div class="white-key" data-note="ラ">ラ</div>
  <div class="white-key" data-note="シ">シ</div>

  <div class="black-key" data-note="ド#" style="left:9.5%;">ド#</div>
  <div class="black-key" data-note="レ#" style="left:23%;">レ#</div>
  <div class="black-key" data-note="ファ#" style="left:50%;">ファ#</div>
  <div class="black-key" data-note="ソ#" style="left:63.5%;">ソ#</div>
  <div class="black-key" data-note="ラ#" style="left:77%;">ラ#</div>
</div>

<audio id="audioPlayer" controls></audio>

<br><br>

<a id="downloadLink"></a>

<script>

let audioContext;
let analyser;
let mic;
let dataArray;
let currentStream;
let isRunning = false;

let mediaRecorder;
let recordedChunks = [];
let recordingStream;

const notes = [
"ド","ド#","レ","レ#","ミ",
"ファ","ファ#","ソ","ソ#",
"ラ","ラ#","シ"
];

async function startAudio(){

  if(isRunning) return;

  audioContext = new (
    window.AudioContext ||
    window.webkitAudioContext
  )();

  currentStream =
    await navigator.mediaDevices.getUserMedia({
      audio:true
    });

  mic =
    audioContext.createMediaStreamSource(currentStream);

  analyser =
    audioContext.createAnalyser();

  analyser.fftSize = 4096;

  dataArray =
    new Float32Array(analyser.fftSize);

  mic.connect(analyser);

  isRunning = true;

  document.getElementById("freq")
    .textContent = "測定中...";

  detectPitch();
}

function stopAudio(){

  isRunning = false;

  if(currentStream){

    currentStream
      .getTracks()
      .forEach(track => track.stop());

    currentStream = null;
  }

  if(audioContext){

    audioContext.close();

    audioContext = null;
  }

  document.getElementById("note")
    .textContent = "--";

  document.getElementById("freq")
    .textContent = "停止中";

  clearKeyboard();
}

function detectPitch(){

  if(!isRunning) return;

  analyser.getFloatTimeDomainData(dataArray);

  const freq =
    autoCorrelate(
      dataArray,
      audioContext.sampleRate
    );

  if(freq > 60 && freq < 2000){

    const noteNumber =
      Math.round(
        12 * Math.log2(freq / 440) + 69
      );

    const noteName =
      notes[noteNumber % 12];

    const octave =
      Math.floor(noteNumber / 12) - 1;

    document.getElementById("note")
      .textContent =
      noteName + octave;

    document.getElementById("freq")
      .textContent =
      "周波数: " +
      freq.toFixed(1) +
      " Hz";

    highlightKey(noteName);
  }

  requestAnimationFrame(detectPitch);
}

function highlightKey(noteName){

  clearKeyboard();

  const key = document.querySelector(
    `[data-note="${noteName}"]`
  );

  if(!key) return;

  if(key.classList.contains("white-key")){
    key.classList.add("active-white");
  }else{
    key.classList.add("active-black");
  }
}

function clearKeyboard(){

  document
    .querySelectorAll(".white-key")
    .forEach(key => key.classList.remove("active-white"));

  document
    .querySelectorAll(".black-key")
    .forEach(key => key.classList.remove("active-black"));
}

function autoCorrelate(buffer,sampleRate){

  let SIZE = buffer.length;

  let rms = 0;

  for(let i=0;i<SIZE;i++){
    rms += buffer[i]*buffer[i];
  }

  rms = Math.sqrt(rms/SIZE);

  if(rms < 0.02){
    return -1;
  }

  let bestOffset = -1;
  let bestCorrelation = 0;

  for(let offset=20;
      offset<SIZE/2;
      offset++){

    let correlation = 0;

    for(let i=0;
        i<SIZE/2;
        i++){

      correlation += Math.abs(
        buffer[i] -
        buffer[i+offset]
      );
    }

    correlation =
      1 - correlation/(SIZE/2);

    if(correlation > bestCorrelation){

      bestCorrelation =
        correlation;

      bestOffset =
        offset;
    }
  }

  if(bestCorrelation > 0.6){
    return sampleRate / bestOffset;
  }

  return -1;
}

async function startRecording(){

  recordingStream =
    await navigator.mediaDevices.getUserMedia({
      audio:true
    });

  recordedChunks = [];

  mediaRecorder =
    new MediaRecorder(recordingStream);

  mediaRecorder.ondataavailable = event => {
    if(event.data.size > 0){
      recordedChunks.push(event.data);
    }
  };

  mediaRecorder.onstop = () => {

    const blob =
      new Blob(recordedChunks,
      { type:'audio/webm' });

    const url = URL.createObjectURL(blob);

    const audioPlayer =
      document.getElementById('audioPlayer');

    audioPlayer.src = url;

    const downloadLink =
      document.getElementById('downloadLink');

    downloadLink.href = url;
    downloadLink.download = 'sound_recording.webm';
    downloadLink.textContent = '録音ファイルを保存';

    if(recordingStream){
      recordingStream
        .getTracks()
        .forEach(track => track.stop());
      recordingStream = null;
    }
  };

  mediaRecorder.start();

  document.getElementById("freq")
    .textContent = "録音中...";
}

function stopRecording(){

  if(mediaRecorder && mediaRecorder.state !== "inactive"){
    mediaRecorder.stop();
  }

  document.getElementById("freq")
    .textContent = "録音停止";
}

</script>

</body>
</html>
